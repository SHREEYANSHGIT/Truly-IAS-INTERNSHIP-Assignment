# Render Blueprint for the FastAPI backend (Free Tier)
# Deploy via: https://dashboard.render.com/blueprints
# After deploying, set the CORS_ORIGINS env var to your Vercel frontend URL.
services:
  - type: web
    name: scheduling-assistant-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        value: ./data/app.db
      - key: PYTHON_VERSION
        value: "3.12.3"
